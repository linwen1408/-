<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留白之地 | Blank Space</title>
    <style>
        :root {
            --bg-color: #f7f3f0; /* 燕麦色背景 */
            --text-color: #5d5d5d;
            --accent-color: #8da491; /* 鼠尾草绿 */
            --card-bg: rgba(255, 255, 255, 0.6);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 顶部导航 */
        nav {
            width: 100%;
            padding: 40px 0;
            display: flex;
            justify-content: center;
            gap: 50px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        nav a {
            text-decoration: none;
            color: var(--text-color);
            transition: color 0.3s;
            cursor: pointer;
        }

        nav a:hover {
            color: var(--accent-color);
        }

        /* 核心区：电子木鱼 */
        .zen-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #muyu {
            width: 180px;
            height: 150px;
            background: #4a4a4a;
            border-radius: 50% 50% 40% 40%;
            cursor: pointer;
            position: relative;
            transition: transform 0.1s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        #muyu:active {
            transform: scale(0.95);
        }

        #muyu::after {
            content: "";
            position: absolute;
            width: 80%;
            height: 10px;
            background: #333;
            bottom: 30px;
            left: 10%;
            border-radius: 5px;
        }

        .merit-text {
            position: absolute;
            color: var(--accent-color);
            font-weight: bold;
            pointer-events: none;
            animation: moveUp 1.2s forwards;
            opacity: 0;
        }

        @keyframes moveUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        .counter {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #999;
            letter-spacing: 1px;
        }

        /* 底部模块预览 */
        .bottom-shelf {
            width: 100%;
            max-width: 800px;
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            text-align: center;
        }

        .module-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            font-size: 0.85rem;
            border: 1px solid rgba(255,255,255,0.3);
        }

        h1 { font-weight: 200; margin-bottom: 50px; letter-spacing: 8px; }

    </style>
</head>
<body>

    <nav>
        <a>放空室</a>
        <a>补给站</a>
        <a>回音壁</a>
        <a>关于留白</a>
    </nav>

    <div class="zen-container">
        <h1>留白之地</h1>
        <div id="muyu" onclick="hitMuyu()"></div>
        <div class="counter">今日已化解焦虑：<span id="count">0</span></div>
    </div>

    <div class="bottom-shelf">
        <div class="module-card">
            <p>🎧 正在播放: 挪威的森林雨声</p>
        </div>
        <div class="module-card">
            <p>📖 本周荐书: 《松浦弥太郎的日日 100》</p>
        </div>
        <div class="module-card">
            <p>📮 12 条新碎碎念已入坑</p>
        </div>
    </div>

    <script>
        let count = 0;
        const slogans = ["焦虑 -1", "功德 +1", "尾款 +1", "发量 +1", "甲方退散", "拒绝内耗"];

        function hitMuyu() {
            count++;
            document.getElementById('count').innerText = count;

            // 创建漂浮文字
            const text = document.createElement('div');
            text.className = 'merit-text';
            text.innerText = slogans[Math.floor(Math.random() * slogans.length)];
            
            // 随机位置偏移
            const offset = (Math.random() - 0.5) * 100;
            text.style.left = `calc(50% + ${offset}px)`;
            text.style.top = `45%`;

            document.body.appendChild(text);

            // 动画结束后移除
            setTimeout(() => {
                text.remove();
            }, 1200);

            // 震动反馈 (如果手机支持)
            if (window.navigator.vibrate) {
                window.navigator.vibrate(50);
            }
        }
    </script>
</body>
</html>
